##############################################################################
# .github/workflows/terraform.yml
# Deploys Azure infrastructure using Terraform + Client Secret auth
#
# Triggers:
#   - Push to main          → plan + apply (after PR merge)
#   - Pull Request (any)    → plan only, posts comment to PR
#   - Manual trigger        → plan only (apply skipped — not a push event)
##############################################################################

name: Terraform Azure Deploy

on:
  push:
    branches:
      - main
  pull_request:             # no branches filter — triggers on PRs from any feature branch
  workflow_dispatch:        # manual trigger button in GitHub UI

permissions:
  id-token: write
  contents: read
  pull-requests: write      # allows posting plan output as PR comment

env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VERSION:          "1.7.5"
  WORKING_DIR:         "."

jobs:

  ##############################################################################
  # JOB 1 — Terraform Plan
  # Runs on: all triggers (PR, push to main, manual)
  ##############################################################################
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Login to Azure via Client Secret ─────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      ######      

      # ── 3. Install Terraform ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 4. terraform init ────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=demo/terraform.tfstate" \
            -input=false

      # ── 5. terraform validate ────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      # ── 6. terraform plan ────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode \
            -var="resource_group_name=rg-demo-github-actions" \
            -var="location=eastus2" \
          ; echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 7. Save plan as text for PR comment ──────────────────────────────────
      - name: Save plan output
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform show -no-color tfplan > plan.txt 2>&1

      # ── 8. Upload plan artifact ──────────────────────────────────────────────
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/plan.txt
          retention-days: 5

      # ── 9. Post plan output as PR comment ───────────────────────────────────
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... output truncated ...'
              : plan;

            const initOutcome      = '${{ steps.init.outcome }}';
            const validateOutcome  = '${{ steps.validate.outcome }}';
            const planExitCode     = '${{ steps.plan.outputs.exit_code }}';

            const planStatus =
              planExitCode === '0' ? '✅ No changes' :
              planExitCode === '2' ? '⚠️ Changes detected' :
              '❌ Failed';

            const body = `## Terraform Plan Result

            | Step     | Status |
            |----------|--------|
            | Init     | ${initOutcome    === 'success' ? '✅ Success' : '❌ Failed'} |
            | Validate | ${validateOutcome === 'success' ? '✅ Success' : '❌ Failed'} |
            | Plan     | ${planStatus} |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Triggered by: ${{ github.actor }} on \`${{ github.ref }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── 10. Fail if plan errored ─────────────────────────────────────────────
      - name: Check plan result
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "Terraform plan failed!"
          exit 1

  ##############################################################################
  # JOB 2 — Terraform Apply
  # Runs on: push to main ONLY (i.e. after a PR is merged)
  #
  # FIX: github.event_name == 'push' ensures this NEVER runs on:
  #   - pull_request events (PR open/update)
  #   - workflow_dispatch (manual trigger from any branch)
  # It only runs when code lands on main via a merge.
  ##############################################################################
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.plan_exit_code == '2'

    environment: production   # adds manual approval gate in GitHub (optional)

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Azure Login ───────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      # ── 3. Setup Terraform ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 4. Download plan artifact ────────────────────────────────────────────
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      # ── 5. terraform init ────────────────────────────────────────────────────
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=demo/terraform.tfstate" \
            -input=false

      # ── 6. terraform apply ───────────────────────────────────────────────────
      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan

      # ── 7. Show outputs ──────────────────────────────────────────────────────
      - name: Terraform Output
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=== Deployed Resources ==="
          terraform output


#added approvers